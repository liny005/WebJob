name: Build & Publish Docker Image

on:
  push:
    branches:
      - main          # push 到 main → 发布 :latest
    tags:
      - "v*.*.*"      # push tag v1.2.3 → 同时发布 :1.2.3 和 :latest
  workflow_dispatch:  # 允许在 Actions 页面手动触发

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}   # liny005/webjob → ghcr.io/liny005/webjob

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write   # 允许推送到 ghcr.io

    steps:
      # 1. 检出代码
      - name: Checkout
        uses: actions/checkout@v4

      # 2. 设置 QEMU（支持 arm64 跨平台构建）
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # 3. 设置 Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 4. 登录 GitHub Container Registry
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 5. 提取 Docker 元数据（自动生成 tag 和 label）
      #    - main 分支  → :latest
      #    - tag v1.2.3 → :1.2.3 、:1.2 、:1 、:latest
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}

      # 6. 构建并推送（amd64 + arm64 双平台）
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # 利用 GitHub Actions 缓存加速构建
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # 7. 把镜像包设为公开，任何人无需登录即可 docker pull
      #    ghcr.io 新建的 package 默认私有，这步确保每次发布后都是公开状态
      - name: Set package visibility to public
        run: |
          PKG_NAME=$(echo "${{ github.repository }}" | cut -d'/' -f2 | tr '[:upper:]' '[:lower:]')
          gh api graphql -f query="
            mutation {
              changeUserPackageVisibility(input: {
                ownerId: \"$(gh api /users/${{ github.repository_owner }} --jq .node_id)\",
                visibility: PUBLIC,
                packageName: \"$PKG_NAME\",
                packageType: CONTAINER
              }) { clientMutationId }
            }
          " || echo "::notice::镜像包已是公开状态或无需变更"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
